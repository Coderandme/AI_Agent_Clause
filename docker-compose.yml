# Local development only. In production, Postgres is Neon (free tier) and this file is not used.
#
# The image is pgvector/pgvector, not plain postgres, so that `CREATE EXTENSION vector` in the
# initial migration succeeds locally exactly as it does on Neon.

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: clause
      POSTGRES_PASSWORD: clause
      POSTGRES_DB: clause
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clause -d clause"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres-data:
